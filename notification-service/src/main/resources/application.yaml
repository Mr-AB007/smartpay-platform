server:
  port: 8083

spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://localhost:5432/smartpay
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update

    show-sql: true
  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: notification-group

      auto-offset-reset: earliest

      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer

      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer

      properties:

        spring:
          json:
            trusted:
              packages: "*"

            value:
              default:
                type: com.smartpay.notification_service.event.TransactionEvent
