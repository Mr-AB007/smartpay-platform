server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        - id: account-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/accounts/**

        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/transactions/**

        - id: notification-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/notifications/**