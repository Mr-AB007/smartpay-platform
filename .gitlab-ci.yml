stages:
  - build
  - test
  # - package
  # - deploy

variables:
  # This automatically targets your project's built-in GitLab Container Registry
  DOCKER_IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  MICROSERVICES: "account-service transaction-service notification-service smartpay-gateway"

cache:
  key: "maven-cache-$CI_COMMIT_REF_SLUG"
  paths:
    - .m2/repository

# ==========================================
# 1. BUILD STAGE (Runs on ALL branches)
# ==========================================
compile-code:
  stage: build
  image: maven:3.9.6-eclipse-temurin-21
  script:
    - echo "========================================================="
    - echo "STARTING MAVEN COMPILATION"
    - echo "Triggered by User - $GITLAB_USER_NAME (@$GITLAB_USER_LOGIN)"
    - echo "Commit Message   - $CI_COMMIT_MESSAGE"
    - echo "========================================================="
    - mvn clean compile
  # Enterprise Audit Logs
  after_script:
    - echo "[AUDIT LOG] Compilation phase completed for commit $CI_COMMIT_SHA by $GITLAB_USER_NAME."

# ==========================================
# 2. TEST STAGE (Runs on ALL branches)
# ==========================================
run-tests:
  stage: test
  script:
    - echo "Running automated unit tests..."
    # Replace this with your test execution command (e.g., npm test, pytest)

# ==========================================
# 3. PACKAGE STAGE (Main Branch Only)
# ==========================================
build-docker-image:
  stage: package
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Authenticates automatically using GitLab's built-in environment variables
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image for SmartPay..."
    - docker build -t $DOCKER_IMAGE_TAG .
    - docker push $DOCKER_IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# 4. DEPLOY STAGE (Main Branch Only)
# ==========================================
deploy-to-production:
  stage: deploy
  script:
    - echo "Pulling $DOCKER_IMAGE_TAG and deploying to production server..."
    # Add your deployment script, SSH triggers, or Kubernetes rollout commands here
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
