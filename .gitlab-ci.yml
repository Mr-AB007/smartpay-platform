stages:
  - build
  - test
  - package
  - deploy

variables:
  # This automatically targets your project's built-in GitLab Container Registry
  DOCKER_IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

# ==========================================
# 1. BUILD STAGE (Runs on ALL branches)
# ==========================================
compile-code:
  stage: build
  script:
    - echo "Compiling/building application code..."
    # Replace this with your actual build command (e.g., npm run build, mvn compile, etc.)

# ==========================================
# 2. TEST STAGE (Runs on ALL branches)
# ==========================================
run-tests:
  stage: test
  script:
    - echo "Running automated unit tests..."
    # Replace this with your test execution command (e.g., npm test, pytest)

# ==========================================
# 3. PACKAGE STAGE (Main Branch Only)
# ==========================================
build-docker-image:
  stage: package
  image: docker:24.0.5
  services:
    - docker:24.0.5-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Authenticates automatically using GitLab's built-in environment variables
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Building Docker image for SmartPay..."
    - docker build -t $DOCKER_IMAGE_TAG .
    - docker push $DOCKER_IMAGE_TAG
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ==========================================
# 4. DEPLOY STAGE (Main Branch Only)
# ==========================================
deploy-to-production:
  stage: deploy
  script:
    - echo "Pulling $DOCKER_IMAGE_TAG and deploying to production server..."
    # Add your deployment script, SSH triggers, or Kubernetes rollout commands here
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
